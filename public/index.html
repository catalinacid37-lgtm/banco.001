<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banco</title>

<style>
body { font-family: Arial; background:#f4f6f8; }
.nav { background:#0c9647; color:white; padding:15px; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
button { background:#0c9647; color:white; border:none; padding:8px; margin:3px; border-radius:6px; }
</style>

</head>

<body>

<div class="nav">💳 Banco Sistema</div>

<button onclick="listar()">Ver Todos</button>
<button onclick="listarRut()">Solo con RUT</button>

<div id="lista"></div>

<h3>Agregar cuenta a cliente</h3>
<input id="idCliente" placeholder="ID cliente">
<input id="numero" placeholder="Número">
<input id="saldo" placeholder="Saldo">
<button onclick="agregarRut()">Agregar RUT</button>
<button onclick="agregarAhorro()">Agregar Ahorro</button>

<script>
const API = "http://localhost:3000";

function render(data) {
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    data.clientes.forEach(c => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
        <b>${c.nombre}</b> (ID: ${c.id})<br>
        RUT: ${c.cuentaRUT ? c.cuentaRUT.numero : 'No tiene'}<br>
        Ahorros: ${c.cuentasAhorro.length}<br>

        <button onclick="eliminarCliente(${c.id})">Eliminar cliente</button>
        <button onclick="eliminarRut(${c.id})">Eliminar RUT</button>
        `;

        c.cuentasAhorro.forEach(a => {
            const btn = document.createElement('button');
            btn.textContent = 'Eliminar ahorro ' + a.numero;
            btn.onclick = () => eliminarAhorro(c.id, a.numero);
            div.appendChild(btn);
        });

        lista.appendChild(div);
    });
}

function listar() {
    fetch(API)
    .then(r=>r.json())
    .then(render);
}

function listarRut() {
    fetch(API + '?filtro=rut')
    .then(r=>r.json())
    .then(render);
}

function agregarRut() {
    fetch(API, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            accion:'agregar_rut',
            id: document.getElementById('idCliente').value,
            numero: document.getElementById('numero').value,
            saldo: document.getElementById('saldo').value
        })
    }).then(()=>listar());
}

function agregarAhorro() {
    fetch(API, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            accion:'agregar_ahorro',
            id: document.getElementById('idCliente').value,
            numero: document.getElementById('numero').value,
            saldo: document.getElementById('saldo').value
        })
    }).then(()=>listar());
}

function eliminarCliente(id) {
    fetch(`${API}?id=${id}&tipo=cliente`, {method:'DELETE'})
    .then(()=>listar());
}

function eliminarRut(id) {
    fetch(`${API}?id=${id}&tipo=rut`, {method:'DELETE'})
    .then(()=>listar());
}

function eliminarAhorro(id, numero) {
    fetch(`${API}?id=${id}&tipo=ahorro&numero=${numero}`, {method:'DELETE'})
    .then(()=>listar());
}
</script>

</body>
</html>
